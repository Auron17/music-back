name: CI/CD - Music Back

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodni yuklash
        uses: actions/checkout@v4

      - name: 📦 Node 20 o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📚 Bog'liqliklarni o'rnatish
        run: npm ci

      - name: ⚙️ Prisma client generatsiya
        run: npx prisma generate

      - name: 🏗️ NestJS build
        run: npm run build

      - name: 🔐 Build artefaktlarini serverga yuborish
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: "dist/,prisma/,package.json,package-lock.json"
          target: "${{ secrets.MUSIC_BACK_PROJECT_DIR }}"

      - name: 🚀 Serverda restart qilish
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            #!/bin/bash
            set -e

            cd ${{ secrets.MUSIC_BACK_PROJECT_DIR }}

            echo "📍 Joriy direktoriya: $(pwd)"
            echo ""

            # Build artefaktini tekshirish
            if [ ! -d "dist" ]; then
              echo "❌ dist papkasi topilmadi!"
              ls -la
              exit 1
            fi
            echo "✅ Build artefaktlari joyida"
            echo ""

            # .env mavjudligini tekshirish
            if [ ! -f ".env" ]; then
              echo "❌ .env fayl topilmadi!"
              exit 1
            fi
            echo "✅ .env joyida"
            echo ""

            # App'ni to'xtatish (DB reset paytida aktiv ulanishlar bo'lmasligi uchun)
            echo "⏸️ PM2 stop artist-api..."
            pm2 stop artist-api 2>/dev/null || true

            # Bog'liqliklarni o'rnatish (native binding'lar uchun server platformasida)
            echo "📚 npm ci..."
            npm ci

            # Prisma client (server'ning Node versiyasi uchun)
            echo "⚙️ prisma generate..."
            npx prisma generate

            # ⚠️ DB to'liq reset - har deploy'da hamma ma'lumot o'chadi
            echo "💥 prisma migrate reset (DB tozalanyapti)..."
            npx prisma migrate reset --force --skip-seed

            # Seed - admin + default artist qaytadan yaratiladi
            echo "🌱 prisma seed..."
            npm run prisma:seed

            # PM2 restart (yoki birinchi marta bo'lsa start)
            echo ""
            echo "🚀 PM2 start/restart..."
            if pm2 describe artist-api > /dev/null 2>&1; then
              echo "  Mavjud process topildi, restart qilamiz..."
              pm2 restart artist-api --update-env
            else
              echo "  Process topilmadi, yangi start qilamiz..."
              pm2 start dist/src/main.js --name artist-api
            fi

            # Reboot uchun PM2 state'ni saqlash
            pm2 save

            sleep 3
            echo ""
            echo "🔍 PM2 status:"
            pm2 status

            # Online ekanini tekshirish
            if ! pm2 describe artist-api | grep -q "status.*online"; then
              echo ""
              echo "❌ artist-api online emas!"
              pm2 logs artist-api --lines 30 --nostream || true
              exit 1
            fi

            echo ""
            echo "✅ artist-api online"
            echo ""
            echo "📊 So'nggi loglar:"
            pm2 logs artist-api --lines 15 --nostream || true
            echo ""
            echo "✅ Deploy muvaffaqiyatli yakunlandi!"
