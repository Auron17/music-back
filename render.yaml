services:
  - type: web
    name: artist-app-backend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run render:build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: UPLOAD_DIR
        value: ./uploads
      - key: DEFAULT_ADMIN_USERNAME
        value: admin
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "*"
